version: "3.9"

services:
  mongo:
    image: mongo:6
    container_name: demo-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-init:
    image: mongo:6
    container_name: demo-mongo-init
    depends_on:
      - mongo
    volumes:
      - ./db/MOCK_DATA.json:/seed/MOCK_DATA.json:ro
      - ./mongo-init/init-mongo.sh:/scripts/init-mongo.sh:ro
      - ./mongo-init/create-indexes.js:/scripts/create-indexes.js:ro
    entrypoint: ["/bin/sh", "/scripts/init-mongo.sh"]

  db-api:
    build:
      context: ./db
    container_name: demo-db-api
    restart: unless-stopped
    environment:
      MONGO_DETAILS: mongodb://mongo:27017
    depends_on:
      - mongo
      - mongo-init
    ports:
      - "8000:8000"

  app:
    build:
      context: ./app
    container_name: demo-app
    restart: unless-stopped
    environment:
      DB_API_HOST: db-api
      DB_API_PORT: "8000"
    depends_on:
      - db-api
    ports:
      - "8080:8080"

  web:
    image: nginx:alpine
    container_name: demo-web
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./web/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mongo_data:
